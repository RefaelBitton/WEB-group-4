<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הרשמה</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body class="bg-slate-100">
  <main class="min-h-screen flex items-center justify-center px-4">
    <section class="w-full max-w-md bg-white rounded-2xl shadow p-8">
      
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-slate-800">יצירת חשבון</h1>
      </div>

      <form>
        <div class="mb-4">
          <label for="childName" class="block text-sm font-medium text-slate-700 mb-1 text-right">
            שם הילד/ה *
          </label>
          <input
            id="childName"
            type="text"
            required
            placeholder="הכניסו את שם הילד/ה"
            class="w-full border border-slate-300 rounded-xl px-4 py-2 text-right"
          />
        </div>

        <div class="mb-4">
          <label for="age" class="block text-sm font-medium text-slate-700 mb-1 text-right">
            גיל *
          </label>
          <input
            id="age"
            type="number"
            required
            min="6"
            max="12"
            placeholder="הכניסו גיל"
            class="w-full border border-slate-300 rounded-xl px-4 py-2 text-right"
          />
        </div>

        <div class="mb-4">
          <label for="level" class="block text-sm font-medium text-slate-700 mb-1 text-right">
            רמת אנגלית *
          </label>
          <select
            id="level"
            required
            class="w-full border border-slate-300 rounded-xl px-4 py-2 text-right"
          >
            <option value="">בחרו רמה</option>
            <option value="beginner">מתחילים</option>
            <option value="basic">בסיסית</option>
            <option value="intermediate">בינונית</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1 text-right">
            אימייל הורה *
          </label>
          <input
            id="email"
            type="email"
            required
            placeholder="parent@example.com"
            class="w-full border border-slate-300 rounded-xl px-4 py-2 text-right"
          />
        </div>

        <div class="mb-5">
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1 text-right">
            סיסמה *
          </label>
          <input
            id="password"
            type="password"
            required
            minlength="6"
            placeholder="הכניסו סיסמה"
            class="w-full border border-slate-300 rounded-xl px-4 py-2 text-right"
          />
        </div>

        <a href="../index.html" class="block">
          <button
            type="button"
            class="w-full bg-indigo-500 text-white py-2 rounded-xl font-medium hover:bg-indigo-600"
          >
            הרשמה
          </button>
        </a>
      </form>

      <p class="text-center text-slate-600 mt-5">
        כבר יש לכם חשבון?
        <a href="../index.html" class="text-indigo-600 font-medium hover:underline">
          התחברו
        </a>
      </p>

    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>

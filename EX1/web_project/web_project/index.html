<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> התחברות</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
<section class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
  <div class="bg-white w-full max-w-md rounded-2xl shadow-sm p-8">
    
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-slate-800">התחברות</h1>
      <p class="text-slate-500 mt-2">
        הכניסו את הפרטים כדי להתחיל ללמוד אנגלית
      </p>
    </div>

    <form class="space-y-5">
      
      <div>
        <label for="username" class="block text-sm font-medium text-slate-700 mb-1 text-right">
          שם משתמש
        </label>
        <input
          id="username"
          type="text"
          placeholder="הכניסו שם משתמש"
          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-right"
        >
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1 text-right">
          סיסמה
        </label>
        <input
          id="password"
          type="password"
          placeholder="הכניסו סיסמה"
          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-right"
        >
      </div>

      <a href="./dashboard.html" class="block">
        <button
          type="button"
          class="w-full bg-indigo-500 text-white py-3 rounded-xl font-medium hover:bg-indigo-600"
        >
          התחברות
        </button>
      </a>

    </form>

    <p class="text-center text-sm text-slate-500 mt-6">
      תלמידים חדשים?
      <a href="./src/register.html" class="text-indigo-600 font-medium hover:underline">
        צרו חשבון
      </a>
    </p>

  </div>
</section>
</body>
</html>

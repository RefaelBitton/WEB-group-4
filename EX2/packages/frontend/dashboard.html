<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Buddy - ללמוד אנגלית עם בוט ידידותי</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="min-h-screen bg-slate-100">
      <!-- Top Navbar -->
      <nav class="bg-white shadow-sm border-b border-slate-200">
        <div
          class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
        >
          <!-- Logo -->
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center text-white text-xl font-bold"
            >
              E
            </div>
            <div>
              <h1 class="text-xl font-bold text-slate-800">English quest</h1>
              <p class="text-sm text-slate-500">לומדים אנגלית עם בוט ידידותי</p>
            </div>
          </div>

          <!-- Menu Links -->
          <ul
            class="hidden md:flex items-center gap-8 text-slate-700 font-medium"
          >
            <li><a href="#" class="hover:text-indigo-600">בית</a></li>
            <li><a href="#" class="hover:text-indigo-600">תרגול</a></li>
            <li><a href="#" class="hover:text-indigo-600">נושאים</a></li>
            <li><a href="#" class="hover:text-indigo-600">התקדמות</a></li>
            <li><a href="#" class="hover:text-indigo-600">דוח להורים</a></li>
          </ul>

          <!-- User Button -->
          <button
            class="bg-indigo-500 text-white px-5 py-2 rounded-xl font-medium hover:bg-indigo-600"
          >
            התחילו ללמוד
          </button>
        </div>
      </nav>

      <!-- Main Layout -->
      <main
        class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-4 gap-6"
      >
        <!-- Side Menu -->
        <aside class="bg-white rounded-2xl shadow-sm p-5 lg:col-span-1">
          <h2 class="text-lg font-bold text-slate-800 mb-4 text-right">
            תפריט
          </h2>

          <div class="space-y-3">
            <button
              class="w-full text-right px-4 py-3 rounded-xl bg-indigo-50 text-indigo-700 font-medium"
            >
              צ'אט עם הבוט
            </button>

            <button
              class="w-full text-right px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700"
            >
              תרגול אוצר מילים
            </button>

            <button
              class="w-full text-right px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700"
            >
              תרגול דיבור
            </button>

            <button
              class="w-full text-right px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700"
            >
              הנקודות שלי
            </button>

            <button
              class="w-full text-right px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-700"
            >
              הישגים
            </button>
          </div>
        </aside>

        <!-- Content Area -->
        <section class="lg:col-span-3 space-y-6">
          <!-- Welcome Card -->
          <div class="bg-white rounded-2xl shadow-sm p-6">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">
              ברוכה השבה, נועה!
            </h2>
            <p class="text-slate-600">
              בחרו נושא והתחילו לתרגל אנגלית עם בוט הלמידה שלכם.
            </p>
          </div>

          <div id="learning-studio"></div>
        </section>
      </main>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link href = "/second2026Web/src/output.css" rel="stylesheet">
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">

  <div class="bg-white p-8 rounded shadow-md w-96">
    <h2 class="text-2xl font-semibold mb-4">Login</h2>

    <input type="text" id="loginId" placeholder="Username or Email" class="border p-2 mb-2 w-full">
    <input type="password" id="password" placeholder="Password" class="border p-2 mb-4 w-full">

    <button onclick="login()" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded w-full">Login</button>

    <p id="message" class="mt-4 text-red-500"></p>

    <p class="mt-4 text-center">
      Don't have an account? <a href="registerT.html" class="text-blue-500 hover:underline">Register</a>
    </p>
  </div>
  <script src="loginT.js"></script>
</body>
</html>
